# SpringBoot Application Properties

spring.application.name=CITYdata

# Certs
rsa.private-key=classpath:scripts/certs/private.pem
rsa.public-key=classpath:scripts/certs/public.pem

# MongoDB configurations
mongo.enabled=false
spring.data.mongodb.uri=mongodb://localhost:27017/citydata
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# Portfolio Manager Energy Star Configuration
# TODO: If multiple Portfolio manager accounts are needed, a dedicated authentication producer should replace multiple entries in the file. It is unrelated to the JWT auth
portfoliomanager.base-url=https://portfoliomanager.energystar.gov/ws
portfoliomanager.username=$PM_USERNAME
portfoliomanager.password=$PM_USERNAME

# Ensure default security configuration is not auto-wired
spring.main.allow-bean-definition-overriding=true

# Path to CITYdata credentials file (list of usernames and passwords)
# You do not have a credentials file? Please run src/main/resources/scripts/credentials-manager.sh (highly recommended)
security.credentials.path=./src/main/resources/scripts/credentials/credentials.txt

# Server host. Use this property only if you want to serve the application on a subpath without a reverse proxy.
# server.servlet.context-path=/citydata

# Server port (8080 is the default from Spring)
# server.port=8084
