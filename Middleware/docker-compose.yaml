services:
  # CITYdata Java Spring Application
  citydata:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citydata
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/myapp
      - JAVA_OPTS=-Xms512m -Xmx1024m
    networks:
      - citydata-network
    volumes:
      - ./logs:/app/logs
      - ./src/main/resources/scripts/credentials:./src/main/resources/scripts/credentials
    restart: unless-stopped

  # MongoDB Database
  #1mongodb:
  #1  image: mongo:7.0
  #1  container_name: mongodb-citydata
  #1  ports:
  #1    - "27017:27017"
  #1  volumes:
  #1    - mongodb_data:/data/db
  #1    - ./mongo-init:/docker-entrypoint-initdb.d
  #1  networks:
  #1    - citydata-network
  #1  restart: unless-stopped

networks:
  citydata-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local