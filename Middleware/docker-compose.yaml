services:
  # CITYdata Java Spring Application
  citydata:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citydata
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/myapp
      - JAVA_OPTS=-Xms512m -Xmx1024m
    networks:
      - citydata-network
    volumes:
      - ./logs:/app/logs
      - ./src/main/resources/scripts/credentials:/app/src/main/resources/scripts/credentials
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: mongodb-citydata
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - citydata-network
    restart: unless-stopped

networks:
  citydata-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local